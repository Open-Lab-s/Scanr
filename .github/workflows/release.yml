name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: scanr-x86_64-unknown-linux-gnu
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: scanr-aarch64-unknown-linux-gnu
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: scanr-x86_64-apple-darwin
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: scanr-aarch64-apple-darwin
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: scanr-x86_64-pc-windows-msvc.exe
            use_cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Build binary (cargo)
        if: ${{ !matrix.use_cross }}
        shell: bash
        run: |
          cargo build --release --package scanr-cli --bin scanr --target "${{ matrix.target }}"

      - name: Build binary (cross)
        if: matrix.use_cross
        shell: bash
        run: |
          cross build --release --package scanr-cli --bin scanr --target "${{ matrix.target }}"

      - name: Collect artifact (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/scanr" "${{ matrix.asset_name }}"

      - name: Collect artifact (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/scanr.exe" "${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: scanr-*
          merge-multiple: true

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd dist
          sha256sum scanr-* > sha256sums.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/scanr-*
            dist/sha256sums.txt
